<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Каталог — VeloMarket</title>
  <meta name="description" content="Каталог велосипедов: фильтры, поиск, сортировка, виды отображения и пагинация. Данные в LocalStorage." />

  <link rel="stylesheet" href="./src/css/base.css" />
  <link rel="stylesheet" href="./src/css/components.css" />
  <link rel="stylesheet" href="./src/css/pages.css" />

  <script type="module" src="./src/js/app.js"></script>
</head>
<body data-page="catalog">
  <a class="skip" href="#main">К содержимому</a>

  <header class="header">
    <div class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="./index.html" aria-label="VeloMarket — на главную">
          <span class="brand__mark" aria-hidden="true">🚲</span>
          <span class="brand__name">VeloMarket</span>
        </a>

        <form class="search" id="catalogSearchForm" action="./catalog.html" method="get" role="search" aria-label="Поиск по товарам">
          <input class="search__input" type="search" name="q" placeholder="Поиск: бренд или модель" />
          <button class="search__btn" type="submit" aria-label="Найти">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 18a8 8 0 1 1 5.293-14.293A8 8 0 0 1 10 18Zm11 3-6.1-6.1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </form>

        <nav class="top-actions" aria-label="Быстрые действия">
          <a class="icon-link" href="./admin.html" title="Админка" aria-label="Админка">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm8 9a8 8 0 1 0-16 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </a>
          <a class="icon-link" href="./cart.html" title="Корзина" aria-label="Корзина">
            <span class="badge" data-cart-badge hidden>0</span>
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6h15l-2 9H7L6 6Zm0 0-2-3H2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm8 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </a>
        </nav>
      </div>
    </div>

    <div class="nav">
      <div class="container nav__inner">
        <a class="nav__link" href="./index.html">Главная</a>
        <a class="nav__link is-active" href="./catalog.html">Каталог</a>
        <a class="nav__link" href="./admin.html">Админка</a>
      </div>
    </div>
  </header>

  <main id="main" class="page">
    <div class="container">
      <div class="crumbs">
        <a href="./index.html">Главная</a> <span>/</span> <span>Каталог</span>
      </div>

      <div class="page-head">
        <div>
          <h1 class="page-title">Каталог велосипедов</h1>
          <div class="muted" id="catalogCount">Найдено: —</div>
        </div>

        <div class="toolbar__right">
          <div class="segmented" aria-label="Вид">
            <button class="segmented__btn is-active" type="button" data-view="grid" aria-pressed="true" title="Плитка">
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 4h7v7H4V4Zm9 0h7v7h-7V4ZM4 13h7v7H4v-7Zm9 0h7v7h-7v-7Z" fill="none" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
            <button class="segmented__btn" type="button" data-view="list" aria-pressed="false" title="Список">
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="layout">
        <!-- FILTERS -->
        <aside class="filters" aria-label="Фильтры">
          <div class="filters__card">
            <div class="filters__title">Фильтры</div>

            <div class="field">
              <div class="field__label">Категория</div>
              <div class="radio-list" id="fCategory">
                <label class="radio"><input type="radio" name="cat" value="" checked /> <span>Любая</span></label>
                <label class="radio"><input type="radio" name="cat" value="детский" /> <span>Детский</span></label>
                <label class="radio"><input type="radio" name="cat" value="женский" /> <span>Женский</span></label>
                <label class="radio"><input type="radio" name="cat" value="шоссейный" /> <span>Шоссейный</span></label>
                <label class="radio"><input type="radio" name="cat" value="горный" /> <span>Горный</span></label>
                <label class="radio"><input type="radio" name="cat" value="подростковый" /> <span>Подростковый</span></label>
                <label class="radio"><input type="radio" name="cat" value="складной" /> <span>Складной</span></label>
              </div>
            </div>

            <div class="filters__spacer"></div>

            <div class="field">
              <div class="field__label">Цена</div>
              <div class="range">
                <input class="input" id="fPriceMin" type="number" inputmode="numeric" placeholder="От" />
                <input class="input" id="fPriceMax" type="number" inputmode="numeric" placeholder="До" />
              </div>
            </div>

            <div class="filters__spacer"></div>

            <label class="check">
              <input id="fInStock" type="checkbox" />
              <span>В наличии</span>
            </label>

            <div class="filters__spacer"></div>

            <div class="field">
              <div class="field__label">Бренд</div>
              <div class="chips chips--wrap" id="fBrands">
                <div class="skeleton chip"></div>
                <div class="skeleton chip"></div>
                <div class="skeleton chip"></div>
              </div>
            </div>

            <div class="filters__spacer"></div>

            <div class="field">
              <div class="field__label">Быстро</div>
              <div class="chips chips--wrap">
                <a class="chip chip--action" href="./catalog.html?tag=HIT">Хиты</a>
                <a class="chip chip--action" href="./catalog.html?tag=SALE">Скидки</a>
              </div>
            </div>

            <div class="filters__spacer"></div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <button class="btn btn--primary" type="button" id="applyFiltersBtn">Подобрать</button>
              <button class="btn btn--ghost" type="button" id="resetFiltersBtn">Сбросить</button>
            </div>
          </div>

          
        </aside>

        <!-- CONTENT -->
        <section class="products" id="productsWrap" aria-label="Список товаров">
          <div class="toolbar">
            <div class="sort-chips" aria-label="Сортировка">
              <button class="chip is-active" type="button" data-sort="popular">по популярности</button>
              <button class="chip" type="button" data-sort="price_asc">сначала дешевле</button>
              <button class="chip" type="button" data-sort="price_desc">сначала дороже</button>
              <button class="chip" type="button" data-sort="discount_desc">по скидке</button>
            </div>

            <div class="active-filters" id="activeFilters" aria-label="Активные фильтры">
              <!-- chips -->
            </div>
          </div>

          <div class="grid grid--4" id="productsGrid">
            <div class="skeleton card"></div>
            <div class="skeleton card"></div>
            <div class="skeleton card"></div>
            <div class="skeleton card"></div>
          </div>

          <div class="pagination" id="pagination" aria-label="Пагинация"></div>
        </section>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__left">
        <div class="footer__brand">VeloMarket</div>
        <div class="footer__muted">Каталог: фильтры, сортировки, виды и пагинация.</div>
      </div>
      <div class="footer__right">
        <a class="footer__link" href="./index.html">Главная</a>
        <a class="footer__link" href="./cart.html">Корзина</a>
        <a class="footer__link" href="./admin.html">Админка</a>
      </div>
    </div>
  </footer>

  <div class="toasts" id="toasts" aria-live="polite" aria-relevant="additions"></div>
</body>
</html>
